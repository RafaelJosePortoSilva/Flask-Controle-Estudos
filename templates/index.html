{% extends "base.html" %}

{% block content %}
<div class="row mb-4 align-items-center">
    <div class="col">
        <h2 class="fw-bold text-secondary">Minhas Matérias</h2>
    </div>
    <div class="col text-end">
        <button class="btn btn-primary btn-rounded shadow-sm" data-bs-toggle="modal" data-bs-target="#modalMateria">
            <i class="fas fa-plus me-2"></i>Nova Matéria
        </button>
    </div>
</div>

<div class="row row-cols-1 row-cols-md-3 g-4">
    {% for materia in materias %}
    <div class="col">
        <div class="card h-100 shadow-sm card-materia border-bottom-0">
            <div class="card-body text-center p-4">
                <div class="display-4 mb-3 text-{{ materia.cor }}">
                    <i class="fas fa-book-bookmark"></i>
                </div>
                <h4 class="card-title fw-bold text-dark">{{ materia.nome }}</h4>
                <p class="text-muted small">
                    <span class="badge badge-custom">{{ materia.tarefas|length }} tarefas</span>
                </p>
                <div class="d-grid gap-2 mt-4">
                    <a href="{{ url_for('materia.ver_materia', id=materia.id) }}" class="btn btn-outline-primary btn-rounded">
                        Ver Trilhas de Estudo
                    </a>
                </div>
            </div>
            <div class="card-footer bg-transparent border-0 text-center pb-3">
                <form action="{{ url_for('materia.remover', id=materia.id) }}" method="POST" onsubmit="return confirm('Apagar esta matéria e tudo dentro dela?')">
                    <button type="submit" class="btn btn-link text-danger text-decoration-none btn-sm">
                        <i class="fas fa-trash-alt"></i> Excluir
                    </button>
                </form>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12 text-center py-5">
        <img src="https://illustrations.popsy.co/gray/studying.svg" alt="Sem matérias" style="width: 200px;" class="mb-3">
        <p class="text-muted">Ainda não há matérias. Clique em "Nova Matéria" para começar!</p>
    </div>
    {% endfor %}
</div>

<div class="modal fade" id="modalMateria" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4">
            <form action="{{ url_for('materia.nova') }}" method="POST">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Criar Nova Matéria</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" name="nome" class="form-control form-control-lg rounded-3 mb-3" placeholder="Nome da Matéria" required>
                    <label class="form-label text-muted small">Escolha uma cor de destaque:</label>
                    <select name="cor" class="form-select rounded-3">
                        <option value="primary">Azul</option>
                        <option value="success">Verde</option>
                        <option value="warning">Amarelo</option>
                        <option value="danger">Rosa</option>
                    </select>
                </div>
                <div class="modal-footer border-0">
                    <button type="submit" class="btn btn-primary btn-rounded w-100">Começar a Estudar!</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
