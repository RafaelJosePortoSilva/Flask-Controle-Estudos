{% extends "base.html" %}

{% block content %}
<div class="row mb-4 align-items-center">
    <div class="col">
        <h2 class="fw-bold text-secondary">Minhas Matérias</h2>
    </div>
    <div class="col text-end">
        <button class="btn btn-success rounded-pill" data-bs-toggle="modal" data-bs-target="#modalMateria">
            <i class="fas fa-plus"></i> Nova Matéria
        </button>
    </div>
</div>

<div class="row row-cols-1 row-cols-md-3 g-4">
    {% for materia in materias %}
    <div class="col">
        <div class="card h-100 shadow-sm card-materia">
            <div class="card-body text-center">
                <div class="display-4 mb-2 text-primary">
                    <i class="fas fa-book"></i>
                </div>
                <h5 class="card-title fw-bold">{{ materia.nome }}</h5>
                <p class="text-muted">{{ materia.tarefas|length }} tarefas pendentes</p>
                <a href="{{ url_for('materia.ver_materia', id=materia.id) }}" class="btn btn-outline-primary btn-sm rounded-pill">
                    Abrir Matéria
                </a>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12 text-center py-5">
        <p class="text-muted">Nenhuma matéria cadastrada. Vamos começar?</p>
    </div>
    {% endfor %}
</div>

<div class="modal fade" id="modalMateria" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form action="{{ url_for('materia.nova') }}" method="POST">
                <div class="modal-header">
                    <h5 class="modal-title">Adicionar Nova Matéria</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" name="nome" class="form-control" placeholder="Ex: Matemática, História..." required>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
